spring.application.name=product-service

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://192.168.1.88:3306/testdb2?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=admin
spring.datasource.password=All4one%8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Redis Configuration
spring.data.redis.host=192.168.1.88
spring.data.redis.port=30073
spring.data.redis.password=mypassword
spring.data.redis.timeout=60000

# Cache Configuration
spring.cache.type=redis
spring.cache.redis.cache-null-values=true
spring.cache.redis.time-to-live=600000

# Server Configuration
server.port=8080

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env,beans,loggers,threaddump,heapdump
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true

# Application Info
info.app.name=Product Service
info.app.description=Full stack Product Management app with Spring Boot + Redis + MySQL
info.app.version=1.0.0
info.app.author=Developer
info.app.api.endpoint=/api/products

